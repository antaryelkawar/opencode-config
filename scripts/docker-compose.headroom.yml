services:
  headroom-proxy:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom-proxy
    command: ["headroom", "proxy", "--host", "0.0.0.0", "--port", "8787"]
    environment:
      - HEADROOM_HOST=0.0.0.0
      - OPENAI_TARGET_API_URL=http://192.168.1.103:4000
      - OPENAI_API_KEY=sk-litellm-master-key
    ports:
      - "8787:8787"
    restart: unless-stopped
